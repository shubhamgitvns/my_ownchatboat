<!DOCTYPE html>
<html>

<head>

    <title>AI Chatbot</title>

</head>

<body>

    <h1>Varanasi AI Guide</h1>

    <!-- Chat history -->
    {% for chat in chats %}

    <p>
        <b>You:</b>
        {{ chat.user }}
    </p>

    <p>
        <b>Bot:</b>
        {{ chat.bot }}
    </p>

    <hr>

    {% endfor %}

    <!-- Input form -->
    <form action="/get">

        <input type="text" name="msg" placeholder="Type message">

        <button type="submit">

            Send

        </button>

    </form>

</body>

</html>
